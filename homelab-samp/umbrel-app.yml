category: networking
name: "SA-MP Server"
version: "1.0.0"
tagline: Настоящий SA-MP сервер (samp03svr) с панелью управления
description: >-
  Реальный сервер SA-MP (San Andreas Multiplayer) с веб-панелью управления.

  🎮 Настоящий игровой процесс, слушает порт 7777/UDP.

  📡 Панель опрашивает сервер по официальному query-протоколу SA-MP (тот же, что
  используют все мониторинги/браузеры серверов) — реальный онлайн, не фейк.

  🔧 Консольные команды отправляются через настоящий RCON по UDP.

  📦 Менеджер серверов: скачайте сборку сервера по прямой ссылке прямо из панели,
  она автоматически распакуется, можно держать несколько сборок и переключаться
  между ними.

  🔌 Старт / Стоп / Рестарт управляют настоящим контейнером через Docker Engine API.
releaseNotes: "Первый релиз: реальный сервер + UDP query/RCON-панель + менеджер серверов"
