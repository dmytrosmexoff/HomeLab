version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: homelab-samp_web_1
      APP_PORT: 3000
    ports:
      - "8092:8080"
    restart: on-failure

  game:
    image: dmytrosmexoff/samp-game:latest
    container_name: homelab-samp_game_1
    restart: on-failure
    stop_grace_period: 30s
    environment:
      RCON_PASSWORD: "${RCON_PASSWORD:-122344}"
    ports:
      - "7777:7777/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/server/data
    networks:
      - default
    # ---- АВТОМАТИЧЕСКАЯ ЗАГРУЗКА СЕРВЕРА ПРИ ПЕРВОМ ЗАПУСКЕ ----
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        # Проверяем, есть ли уже сервер в папке default
        if [ ! -f /server/data/servers/default/samp03svr ] && [ ! -f /server/data/servers/default/omp-server ]; then
          echo "Скачиваю сервер open.mp..."
          mkdir -p /server/data/servers/default
          cd /server/data/servers/default
          # Скачиваем последнюю стабильную версию open.mp
          curl -L -o omp-server.tar.gz https://github.com/openmultiplayer/open.mp/releases/latest/download/omp-server-linux.tar.gz
          tar -xzf omp-server.tar.gz
          rm omp-server.tar.gz
          chmod +x omp-server
          echo "Сервер open.mp установлен."
        else
          echo "Сервер уже есть, пропускаю скачивание."
        fi
        # Создаём active.json, если его нет
        if [ ! -f /server/data/active.json ]; then
          echo '{"name":"default"}' > /server/data/active.json
          echo "Файл active.json создан."
        fi
        # Запускаем оригинальный entrypoint.sh
        exec /entrypoint.sh

  web:
    image: dmytrosmexoff/samp-panel:latest
    container_name: homelab-samp_web_1
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      SAMP_HOST: homelab-samp_game_1
      SAMP_PORT: "7777"
      SAMP_RCON_PASSWORD: "${RCON_PASSWORD:-122344}"
      DOCKER_CONTAINER_NAME: homelab-samp_game_1
      SERVERS_DIR: /data/servers
      ACTIVE_FILE: /data/active.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/data:/data
    networks:
      - default

networks:
  default:
    driver: bridge
