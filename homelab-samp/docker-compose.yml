version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: homelab-samp_web_1
      APP_PORT: 3000
    ports:
      - "8092:8080"
    restart: on-failure

  game:
    build: ./game
    container_name: homelab-samp_game_1
    restart: on-failure
    stop_grace_period: 30s
    environment:
      RCON_PASSWORD: "${RCON_PASSWORD:-changeme123}"
      MAX_PLAYERS: "${MAX_PLAYERS:-100}"
      HOSTNAME_: "${SAMP_HOSTNAME:-HomeLab SA-MP Server}"
      GAMEMODE: "${GAMEMODE:-rivershell}"
      GAMEMODE_TEXT: "${GAMEMODE_TEXT:-HomeLab RP}"
      ANNOUNCE: "${ANNOUNCE:-0}"
    ports:
      - "7777:7777/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/server/data
    networks:
      - default

  web:
    build: ./web
    container_name: homelab-samp_web_1
    restart: on-failure
    depends_on:
      - game
    environment:
      SAMP_HOST: homelab-samp_game_1
      SAMP_PORT: "7777"
      SAMP_RCON_PASSWORD: "${RCON_PASSWORD:-changeme123}"
      DOCKER_CONTAINER_NAME: homelab-samp_game_1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

networks:
  default:
    driver: bridge
