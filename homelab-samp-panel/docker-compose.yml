version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-samp-panel_app_1
      APP_PORT: 5750

  app:
    build: ./app
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "7777:7777/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/server:/server
    environment:
      - SERVER_DIR=/server
      - DATA_DIR=/data
      - RCON_PASSWORD=${RCON_PASSWORD:-changeme}
