name: Build and Push SA-MP Console

on:
  push:
    branches: [ main ]
    paths:
      - 'homelab-samp-console/web/**'
      - 'homelab-samp-console/server/**'
      - '.github/workflows/build-push-samp-console.yml'
  workflow_dispatch: {}

jobs:
  build-and-push-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web-panel image
        uses: docker/build-push-action@v5
        with:
          context: ./homelab-samp-console/web
          file: ./homelab-samp-console/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/samp-console-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/samp-console-web:${{ github.sha }}
          cache-from: type=gha,scope=samp-web
          cache-to: type=gha,mode=max,scope=samp-web

  build-and-push-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Только linux/amd64: samp03svr — 32-битный x86-бинарник, на ARM (Raspberry Pi)
      # он либо не запустится вовсе, либо будет работать под QEMU-эмуляцией
      # настолько медленно, что игровой сервер станет непригоден.
      - name: Build and push samp-server image
        uses: docker/build-push-action@v5
        with:
          context: ./homelab-samp-console/server
          file: ./homelab-samp-console/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/samp-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/samp-server:${{ github.sha }}
          cache-from: type=gha,scope=samp-server
          cache-to: type=gha,mode=max,scope=samp-server
