name: Build and Push TikTok DLoader

on:
  push:
    branches: [ main ]
    paths:
      - 'homelab-tiktok-dloader/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./homelab-tiktok-dloader
          file: ./homelab-tiktok-dloader/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
