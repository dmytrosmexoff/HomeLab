name: Build and push Docker images
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-tt-dloader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-tt-dloader
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tt-dloader:latest
          platforms: linux/amd64,linux/arm64

  build-url-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-url-short/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-short:latest
          platforms: linux/amd64,linux/arm64

  build-flip-uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-flip-uptime/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flip-uptime:latest
          platforms: linux/amd64,linux/arm64

  # ---- Minecraft ----
  build-minecraft-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-minecraft/web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minecraft-panel:latest
          platforms: linux/amd64,linux/arm64

  # ---- SA-MP ----
  build-samp-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-samp/web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/samp-panel:latest
          platforms: linux/amd64,linux/arm64

  # Игровой образ — это только рантайм (32-бит библиотеки для samp03svr/omp-server).
  # Сам бинарник сервера не встраивается и не качается на этапе сборки — его
  # пользователь скачивает по ссылке прямо в веб-панели после установки приложения,
  # поэтому сборка больше не зависит от стороннего хостинга и не может из-за этого упасть.
  build-samp-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-samp/game
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/samp-game:latest
          platforms: linux/amd64

  # ---- RAGE:MP ----
  build-ragemp-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-ragemp/web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ragemp-panel:latest
          platforms: linux/amd64,linux/arm64

  # Игровой образ не содержит файлов сервера (их пользователь подключает через
  # веб-панель по ссылке), это просто рантайм-окружение.
  build-ragemp-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-ragemp/game
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ragemp-game:latest
          platforms: linux/amd64,linux/arm64
