name: Build and push SA-MP Console images
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-samp-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/samp-panel:latest
          platforms: linux/amd64,linux/arm64

  # Игровой образ — это только рантайм (32-бит библиотеки для samp03svr/omp-server).
  # Сам бинарник сервера не встраивается и не качается на этапе сборки — его
  # пользователь скачивает по ссылке прямо в веб-панели после установки приложения,
  # поэтому сборка больше не зависит от стороннего хостинга и не может из-за этого упасть.
  # Бинарники 32-битные (i386) — эта архитектура доступна только поверх amd64,
  # поэтому arm64 здесь не собираем.
  build-samp-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./game
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/samp-game:latest
          platforms: linux/amd64
