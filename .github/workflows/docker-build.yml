name: Build and push Docker images
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-tt-dloader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-tt-dloader
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tt-dloader:latest
          platforms: linux/amd64,linux/arm64

  build-url-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-url-short/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-short:latest
          platforms: linux/amd64,linux/arm64

  build-flip-uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-flip-uptime/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flip-uptime:latest
          platforms: linux/amd64,linux/arm64

  # ---- Minecraft ----
  build-minecraft-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-minecraft/web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/minecraft-panel:latest
          platforms: linux/amd64,linux/arm64

  # ---- SA-MP ----
  # Игровой образ собирает официальный 32-битный бинарник samp03svr —
  # arm64-сборки для него нет, поэтому только linux/amd64.
  build-samp-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-samp/game
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/samp-game:latest
          platforms: linux/amd64
          
  # ---- RAGE:MP ----
  # Игровой образ не содержит файлов сервера (их кладёт пользователь вручную),
  # это просто рантайм-окружение, поэтому может собираться под обе архитектуры.
  build-ragemp-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-ragemp/game
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ragemp-game:latest
          platforms: linux/amd64,linux/arm64
