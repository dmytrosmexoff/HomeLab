name: Build and push HomeLab app images
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-flip-uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-flip-uptime/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flip-uptime:latest
          platforms: linux/amd64,linux/arm64

  build-tt-dloader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-tt-dloader
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tt-dloader:latest
          platforms: linux/amd64,linux/arm64

  build-url-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./homelab-url-short/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-short:latest
          platforms: linux/amd64,linux/arm64
