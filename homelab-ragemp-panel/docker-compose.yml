version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: homelab-ragemp-panel_app_1
      APP_PORT: 5656
    ports:
      - "5680:5680"
    restart: on-failure

  app:
    image: dmytrosmexoff/ragemp-panel:latest
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "22005:22005/udp"
      - "22007:22007/tcp"
      - "5681:5656"
