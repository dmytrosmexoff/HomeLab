version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-ragemp-panel-app-1
      APP_PORT: 4850

  app:
    image: dmytrosmexoff/ragemp-panel:latest
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "22005:22005/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/server:/server
    environment:
      - SERVER_DIR=/server
      - DATA_DIR=/data
    networks:
      - default

networks:
  default:
    driver: bridge
