version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-minecraft_app_1
      APP_PORT: 5770

  app:
    build: ./app
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "25565:25565/tcp"
      - "25565:25565/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/server:/server
    environment:
      - SERVER_DIR=/server
      - DATA_DIR=/data
      - RCON_PASSWORD=${RCON_PASSWORD:-mcrcon123}
      - RCON_PORT=25575
      - JAVA_OPTS=${JAVA_OPTS:--Xmx2G -Xms512M}
