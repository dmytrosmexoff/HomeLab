version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    environment:
      APP_HOST: homelab-minecraft_web_1
      APP_PORT: 3000
    ports:
      - "8091:8080"
    restart: on-failure

  # Реальный игровой сервер. Образ itzg/minecraft-server — общеизвестный,
  # поддерживаемый годами проект, используется как основа десятков Umbrel/Docker паков.
  mc:
    image: itzg/minecraft-server:latest
    container_name: homelab-minecraft_mc_1
    restart: on-failure
    stop_grace_period: 2m
    tty: true
    stdin_open: true
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-1.20.4}"
      MEMORY: "${MC_MEMORY:-4G}"
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-100}"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD:-changeme123}"
      MOTD: "${MC_MOTD:-HomeLab Minecraft Server}"
    ports:
      - "25565:25565"
    volumes:
      - ${APP_DATA_DIR}/data/minecraft:/data
    networks:
      - default

  # Веб-панель: общается с mc по настоящему RCON-протоколу и с Docker Engine API
  # для статистики контейнера (CPU/RAM/аптайм) и старт/стоп/рестарт.
  web:
    build: ./web
    container_name: homelab-minecraft_web_1
    restart: on-failure
    depends_on:
      - mc
    environment:
      MC_RCON_HOST: homelab-minecraft_mc_1
      MC_RCON_PORT: "25575"
      MC_RCON_PASSWORD: "${RCON_PASSWORD:-changeme123}"
      DOCKER_CONTAINER_NAME: homelab-minecraft_mc_1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

networks:
  default:
    driver: bridge
