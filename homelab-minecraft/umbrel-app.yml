manifestVersion: 1
id: homelab-minecraft
icon: icon.png
category: networking
name: "Minecraft Server"
version: "1.0.0"
tagline: Настоящий Minecraft (Paper) сервер с панелью управления и RCON
description: >-
  Полноценный игровой Minecraft-сервер (образ itzg/minecraft-server, используется
  тысячами серверов по всему миру) с веб-панелью управления в едином стиле HomeLab.

  ⛏ Реальный сервер Paper, данные сохраняются в volume и переживают перезапуск.
  📡 Панель подключается к серверу по настоящему протоколу RCON — никаких фейковых данных.
  📊 Живые метрики: TPS, онлайн игроков (через RCON list/tps), CPU и RAM контейнера из Docker API.
  🖥 Консоль сервера в реальном времени (docker logs) + отправка команд через RCON.
  🔌 Старт / Стоп / Рестарт реально останавливают и поднимают контейнер сервера через Docker Engine API.
releaseNotes: "Первый релиз: реальный сервер + RCON-панель"
