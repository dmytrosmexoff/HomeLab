category: utilities
name: "URL Short"
version: "1.0.0"
tagline: Сокращайте длинные ссылки и храните их локально
description: >-
  URL Short — простой и быстрый сервис сокращения ссылок, работающий полностью локально на вашем Umbrel.

  🔗 Вставьте длинную ссылку — получите короткую за секунду.
  Все ссылки хранятся в файле на вашем устройстве и работают как настоящий редирект.

  📦 Возможности
  — Моментальное сокращение любых URL
  — Рабочий редирект по короткой ссылке
  — Таблица всех созданных ссылок
  — Удаление ненужных ссылок
  — Данные хранятся локально в JSON-файле
  — Без регистрации и авторизации

