version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-mysql-phpmyadmin-1
      APP_PORT: 80

  db:
    image: mysql:8.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: homelab
      MYSQL_USER: ${MYSQL_USER:-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_admin}
    volumes:
      - ${APP_DATA_DIR}/data/mysql:/var/lib/mysql
    networks:
      - default

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PMA_HOST: homelab-mysql-db-1
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      UPLOAD_LIMIT: 300M
    networks:
      - default

networks:
  default:
    driver: bridge
