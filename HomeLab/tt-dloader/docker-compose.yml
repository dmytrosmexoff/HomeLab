version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: tt-dloader
      APP_PORT: 7070

  tt-dloader:
    image: dmytrosmexoff/tiktok-bot:latest
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${UMBREL_ROOT}/home/TikTok:/data/downloads
      - ${APP_DATA_DIR}/data:/data/config
