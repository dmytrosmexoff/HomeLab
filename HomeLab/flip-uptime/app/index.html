<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Uptime</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1115;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6c727f;
  }

  /* FLIP CLOCK */
  .clock {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .flip-group {
    display: flex;
    gap: 4px;
  }

  .flip-sep {
    font-size: 56px;
    font-weight: 700;
    color: #3D6BFF;
    line-height: 80px;
    margin: 0 2px;
    align-self: center;
    margin-bottom: 8px;
  }

  .flip-card {
    width: 64px;
    height: 80px;
    position: relative;
    perspective: 300px;
  }

  .flip-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  /* Static halves */
  .top-half, .bottom-half {
    width: 100%;
    height: 50%;
    background: #1a1d24;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .top-half {
    border-radius: 8px 8px 0 0;
    border-bottom: 1px solid #0f1115;
    align-items: flex-end;
  }
  .bottom-half {
    border-radius: 0 0 8px 8px;
    align-items: flex-start;
  }

  .top-half span, .bottom-half span {
    font-size: 56px;
    font-weight: 700;
    color: #fff;
    line-height: 80px;
    position: absolute;
  }
  .top-half span { bottom: 0; }
  .bottom-half span { top: -40px; }

  /* Flip animation */
  .flip-top, .flip-bottom {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #1a1d24;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    backface-visibility: hidden;
    transform-origin: bottom center;
  }
  .flip-top {
    top: 0;
    border-radius: 8px 8px 0 0;
    transform-origin: bottom center;
  }
  .flip-bottom {
    top: 50%;
    border-radius: 0 0 8px 8px;
    transform-origin: top center;
    align-items: flex-start;
  }

  .flip-top span, .flip-bottom span {
    font-size: 56px;
    font-weight: 700;
    color: #fff;
    line-height: 80px;
    position: absolute;
  }
  .flip-top span { bottom: 0; }
  .flip-bottom span { top: -40px; }

  .flip-top { animation: none; }
  .flip-bottom { animation: none; transform: rotateX(90deg); }

  .flipping .flip-top {
    animation: flipTop 0.3s ease-in forwards;
  }
  .flipping .flip-bottom {
    animation: flipBottom 0.3s ease-out 0.3s forwards;
  }

  @keyframes flipTop {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flipBottom {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }

  /* UPTIME */
  .uptime-block {
    display: flex;
    gap: 16px;
  }

  .uptime-item {
    background: #1a1d24;
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
    min-width: 90px;
  }

  .uptime-val {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(90deg, #3D6BFF, #B43DFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .uptime-lbl {
    font-size: 11px;
    color: #6c727f;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .uptime-title {
    font-size: 13px;
    color: #6c727f;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="title">Текущее время</div>

<div class="clock" id="clock">
  <!-- HH -->
  <div class="flip-group">
    <div class="flip-card" id="h1"></div>
    <div class="flip-card" id="h2"></div>
  </div>
  <div class="flip-sep">:</div>
  <!-- MM -->
  <div class="flip-group">
    <div class="flip-card" id="m1"></div>
    <div class="flip-card" id="m2"></div>
  </div>
  <div class="flip-sep">:</div>
  <!-- SS -->
  <div class="flip-group">
    <div class="flip-card" id="s1"></div>
    <div class="flip-card" id="s2"></div>
  </div>
</div>

<div>
  <div class="uptime-title">Аптайм приложения</div>
  <div class="uptime-block">
    <div class="uptime-item">
      <div class="uptime-val" id="ud">0</div>
      <div class="uptime-lbl">Дней</div>
    </div>
    <div class="uptime-item">
      <div class="uptime-val" id="uh">00</div>
      <div class="uptime-lbl">Часов</div>
    </div>
    <div class="uptime-item">
      <div class="uptime-val" id="um">00</div>
      <div class="uptime-lbl">Минут</div>
    </div>
    <div class="uptime-item">
      <div class="uptime-val" id="us">00</div>
      <div class="uptime-lbl">Секунд</div>
    </div>
  </div>
</div>

<script>
const START = Date.now();
const cards = {};
const current = {};

function pad(n) { return String(n).padStart(2, '0'); }

function buildCard(el, digit) {
  el.innerHTML = `
    <div class="top-half"><span>${digit}</span></div>
    <div class="bottom-half"><span>${digit}</span></div>
    <div class="flip-top"><span>${digit}</span></div>
    <div class="flip-bottom"><span>${digit}</span></div>
  `;
}

function flipCard(el, from, to) {
  const flipTop = el.querySelector('.flip-top span');
  const flipBot = el.querySelector('.flip-bottom span');
  const topHalf = el.querySelector('.top-half span');
  const botHalf = el.querySelector('.bottom-half span');

  flipTop.textContent = from;
  flipBot.textContent = to;

  el.classList.remove('flipping');
  void el.offsetWidth;
  el.classList.add('flipping');

  setTimeout(() => {
    topHalf.textContent = to;
    botHalf.textContent = to;
    el.classList.remove('flipping');
  }, 650);
}

const ids = ['h1','h2','m1','m2','s1','s2'];
ids.forEach(id => {
  cards[id] = document.getElementById(id);
  current[id] = null;
  buildCard(cards[id], '0');
});

function updateClock() {
  const now = new Date();
  const time = pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
  const digits = time.split('');
  ids.forEach((id, i) => {
    const d = digits[i];
    if (current[id] !== d) {
      if (current[id] !== null) {
        flipCard(cards[id], current[id], d);
      } else {
        buildCard(cards[id], d);
      }
      current[id] = d;
    }
  });
}

function updateUptime() {
  const sec = Math.floor((Date.now() - START) / 1000);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  document.getElementById('ud').textContent = d;
  document.getElementById('uh').textContent = pad(h);
  document.getElementById('um').textContent = pad(m);
  document.getElementById('us').textContent = pad(s);
}

updateClock();
updateUptime();
setInterval(updateClock, 1000);
setInterval(updateUptime, 1000);
</script>
</body>
</html>
