version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: flip-uptime
      APP_PORT: 3442

  flip-uptime:
    image: nginx:alpine
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/app:/usr/share/nginx/html:ro
    ports:
      - "3442:80"
