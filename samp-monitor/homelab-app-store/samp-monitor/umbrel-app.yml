manifestVersion: 1
id: samp-monitor
category: networking
name: SA-MP Server Monitor
version: "1.0.0"
tagline: Хостинг и реальный мониторинг SA-MP сервера
description: >-
  Полноценная панель для запуска и управления SA-MP (San Andreas Multiplayer)
  сервером прямо на Umbrel: загрузка gamemode и filterscripts через веб-интерфейс,
  запуск/остановка/рестарт, живая консоль с реальным выводом процесса,
  отправка команд, список игроков с реальным пингом, реальная загрузка CPU/RAM
  игрового процесса. Никаких случайных или тестовых данных — все показатели
  берутся напрямую с работающего сервера.
